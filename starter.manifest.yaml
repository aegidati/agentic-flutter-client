id: agentic-flutter-client
name: Agentic Flutter Client
version: 0.1.0
type: frontend

installsInto: app/client

ownedPaths:
  - app/client

dependencies: []

optionalDependencies:
  - agentic-clean-backend
  - agentic-api-contracts-api
  - agentic-fullstack-composition

provides:
  - flutter-client-foundation
  - multiplatform-client-bootstrap
  - client-structure

requires:
  - flutter-sdk
  - dart-sdk

postInstallChecks:
  - flutter dependencies install
  - flutter analyze runs
  - flutter test runs
  - flutter build or run command is valid

tags:
  - agentic
  - starter
  - flutter
  - client
  - mobile
  - web
  - desktop
