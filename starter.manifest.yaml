id: agentic-flutter-client
name: Agentic Flutter Client
version: 0.1.0
type: frontend
installsInto: app/client

ownedPaths:
  - app/client

dependencies: []

optionalDependencies:
  - agentic-api-contracts-api
  - agentic-fullstack-composition

provides:
  - flutter-client-foundation
  - mobile-web-desktop-client-bootstrap
